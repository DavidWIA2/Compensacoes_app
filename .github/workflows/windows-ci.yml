name: Windows CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall app run.py

      - name: Run tests
        run: python -m pytest -q

  build:
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
      WINDOWS_SIGN_CERT_PFX_B64: ${{ secrets.WINDOWS_SIGN_CERT_PFX_B64 }}
      WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve Inno Setup compiler
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }
          $compiler = $candidates | Select-Object -First 1
          if (-not $compiler) {
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) {
              $compiler = $cmd.Source
            }
          }
          if (-not $compiler) {
            throw "ISCC.exe nao encontrado apos a instalacao do Inno Setup."
          }
          "INNO_SETUP_COMPILER=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore signing certificate
        if: ${{ env.WINDOWS_SIGN_CERT_PFX_B64 != '' }}
        shell: pwsh
        run: |
          $certDir = Join-Path $PWD "build\signing"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $certPath = Join-Path $certDir "release-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_PFX_B64))
          "COMPENSACOES_CERT_PFX=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "COMPENSACOES_CERT_PASSWORD=$env:WINDOWS_SIGN_CERT_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release package
        shell: pwsh
        run: |
          $params = @{
            PythonExe = "python"
            SkipTests = $true
            Clean = $true
            BuildInstaller = $true
            InstallerCompiler = $env:INNO_SETUP_COMPILER
            RequireInstallerCompiler = $true
            HomepageUrl = "https://github.com/${{ github.repository }}"
          }
          if ($env:COMPENSACOES_CERT_PFX) {
            $params.SignArtifacts = $true
          }
          .\scripts\build_release.ps1 @params

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Compensacoes-release
          path: release/*
