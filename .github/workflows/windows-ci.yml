name: Windows CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall app run.py

      - name: Run tests
        run: python -m pytest -q

  build:
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Restore signing certificate
        if: ${{ secrets.WINDOWS_SIGN_CERT_PFX_B64 != '' }}
        shell: pwsh
        run: |
          $certDir = Join-Path $PWD "build\signing"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $certPath = Join-Path $certDir "release-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGN_CERT_PFX_B64 }}"))
          "COMPENSACOES_CERT_PFX=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "COMPENSACOES_CERT_PASSWORD=${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release package
        shell: pwsh
        run: |
          $args = @(
            "-PythonExe", "python",
            "-SkipTests",
            "-Clean",
            "-BuildInstaller",
            "-RequireInstallerCompiler",
            "-HomepageUrl", "https://github.com/${{ github.repository }}"
          )
          if ($env:COMPENSACOES_CERT_PFX) {
            $args += "-SignArtifacts"
          }
          .\scripts\build_release.ps1 @args

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Compensacoes-release
          path: release/*
