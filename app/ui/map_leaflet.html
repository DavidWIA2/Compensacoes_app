<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Mapa Microbacias</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="vendor/leaflet/leaflet.css"/>
<script src="vendor/leaflet/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<style>
  /* ====== Layout base (evita problemas de altura no QWebEngine) ====== */
  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    overflow: hidden;
  }

  body {
    background: #f4f6f9;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  body.dark {
    background: #141516;
    color: #e7e9ee;
  }

  #map {
    position: absolute;
    inset: 0;
    height: 100%;
    width: 100%;
    background: transparent;
  }

  /* ====== Status flutuante (mais premium, menos intrusivo) ====== */
  .floating {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 2000;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.25;
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(160,170,185,0.55);
    max-width: min(520px, calc(100vw - 24px));
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    user-select: none;
    pointer-events: none; /* não atrapalha cliques no mapa */
  }

  body.dark .floating {
    background: rgba(20,22,25,0.85);
    border: 1px solid rgba(58,61,67,0.9);
    color: #e7e9ee;
    box-shadow: 0 10px 26px rgba(0,0,0,0.35);
  }

  /* ====== Leaflet controls (tema claro/escuro) ====== */
  .leaflet-control {
    border-radius: 10px;
    overflow: hidden;
  }

  .leaflet-control-zoom a,
  .leaflet-control-layers-toggle,
  .leaflet-control-layers {
    border: none !important;
    box-shadow: 0 10px 24px rgba(0,0,0,0.15);
  }

  .leaflet-control-zoom a {
    width: 34px;
    height: 34px;
    line-height: 34px;
    font-weight: 700;
  }

  /* Claro */
  .leaflet-control-zoom a,
  .leaflet-control-layers {
    background: rgba(255,255,255,0.95);
    color: #111827;
  }
  .leaflet-control-layers label,
  .leaflet-control-layers-list {
    color: #111827;
    font-size: 12px;
  }

  /* Escuro */
  body.dark .leaflet-control-zoom a,
  body.dark .leaflet-control-layers {
    background: rgba(27,29,31,0.92);
    color: #e7e9ee;
    box-shadow: 0 10px 26px rgba(0,0,0,0.45);
  }

  body.dark .leaflet-control-layers label,
  body.dark .leaflet-control-layers-list {
    color: #e7e9ee;
  }

  /* Ajuste do botão de camadas */
  .leaflet-control-layers-toggle {
    width: 36px !important;
    height: 36px !important;
    background-size: 18px 18px !important;
  }

  /* Tooltip microbacias */
  .leaflet-tooltip {
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.08);
    padding: 6px 10px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.15);
  }
  body.dark .leaflet-tooltip {
    background: rgba(20,22,25,0.92);
    color: #e7e9ee;
    border: 1px solid rgba(58,61,67,0.9);
    box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  }

</style>
</head>

<body>
  <div id="map"></div>
  <div class="floating" id="status">Carregando mapa...</div>

<script>
  function setStatus(txt){
    const el = document.getElementById("status");
    if (el) el.innerText = txt;
  }

  console.info("[MAP INIT] map_leaflet.html carregado");

  window.onerror = function(msg,url,line,col){
    console.error("[MAP JS ERROR]", msg, url, line, col);
    setStatus("Erro JS:\n" + msg);
  };

  // Mapa base
  const map = L.map("map", {
    zoomControl:false,
    preferCanvas:true,
    maxZoom: 18 // Trava de zoom mantida
  }).setView([-22.015,-47.89], 12);

  L.control.zoom({ position:'bottomright' }).addTo(map);

  /* ===========================
     CAMADAS BASE (100% HTTPS)
  ============================ */
  const query = new URLSearchParams(window.location.search);
  const tileScheme = (query.get("tileScheme") || "").trim().toLowerCase();
  const tileProxyBase = (query.get("tileProxy") || "").replace(/\/+$/, "");
  function resolveTileUrl(remoteTemplate, proxyTemplate, schemeTemplate) {
    if (tileScheme === "compmap" && schemeTemplate) return schemeTemplate;
    if (!tileProxyBase) return remoteTemplate;
    return `${tileProxyBase}${proxyTemplate}`;
  }
  if (tileScheme) {
    console.info("[MAP SCHEME]", tileScheme);
  }
  if (tileProxyBase) {
    console.info("[MAP PROXY]", tileProxyBase);
  }

  const tileLight = L.tileLayer(
    resolveTileUrl(
      "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      "/tiles/carto_light/{z}/{x}/{y}.png",
      "compmap:///carto_light/{z}/{x}/{y}.png"
    ),
    { maxZoom:19, attribution:"&copy; OpenStreetMap contributors &copy; CARTO" }
  );

  const tileDark = L.tileLayer(
    resolveTileUrl(
      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      "/tiles/carto_dark/{z}/{x}/{y}.png",
      "compmap:///carto_dark/{z}/{x}/{y}.png"
    ),
    { maxZoom:19, attribution:"&copy; OpenStreetMap contributors" }
  );

  const tileSat = L.tileLayer(
    resolveTileUrl(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      "/tiles/satellite/{z}/{x}/{y}.jpg",
      "compmap:///satellite/{z}/{x}/{y}.jpg"
    ),
    { maxZoom:18, attribution:"&copy; Esri" }
  );

  const tileOsm = L.tileLayer(
    resolveTileUrl(
      "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      "/tiles/osm/{z}/{x}/{y}.png",
      "compmap:///osm/{z}/{x}/{y}.png"
    ),
    { maxZoom:19, attribution:"&copy; OpenStreetMap contributors" }
  );

  // Fallback local para quando a rede/proxy bloquear provedores remotos.
  const tileOffline = L.gridLayer({ attribution:"Modo offline" });
  tileOffline.createTile = function(coords) {
    const tile = document.createElement("canvas");
    const size = this.getTileSize();
    tile.width = size.x;
    tile.height = size.y;
    const ctx = tile.getContext("2d");
    if (ctx) {
      ctx.fillStyle = "#e5e7eb";
      ctx.fillRect(0, 0, size.x, size.y);
      ctx.strokeStyle = "#c9ccd3";
      ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 0.5, size.x - 1, size.y - 1);
      ctx.fillStyle = "#6b7280";
      ctx.font = "12px sans-serif";
      ctx.fillText(`z${coords.z} x${coords.x} y${coords.y}`, 8, 20);
    }
    return tile;
  };

  const baseLayers = {
    "Mapa Claro": tileLight,
    "Mapa Escuro": tileDark,
    "Satelite": tileSat,
    "OSM": tileOsm,
    "Offline (grade)": tileOffline
  };

  const BASE_FALLBACK_ORDER = ["Mapa Claro", "OSM", "Mapa Escuro", "Satelite", "Offline (grade)"];
  let activeBaseLayerName = "Mapa Claro";
  let activeLayerTileErrors = 0;
  let activeLayerTileLoads = 0;
  let suppressLayerChangePersistence = false;

  function resetBaseLayerCounters() {
    activeLayerTileErrors = 0;
    activeLayerTileLoads = 0;
  }

  function pickNextFallback(currentName) {
    const idx = BASE_FALLBACK_ORDER.indexOf(currentName);
    for (let i = idx + 1; i < BASE_FALLBACK_ORDER.length; i++) {
      const nextName = BASE_FALLBACK_ORDER[i];
      if (baseLayers[nextName]) return nextName;
    }
    return null;
  }

  function maybeFallbackFromTileErrors(failedLayerName) {
    if (failedLayerName !== activeBaseLayerName) return;
    if (activeLayerTileLoads > 0) return;
    if (activeLayerTileErrors < 3) return;

    const nextLayer = pickNextFallback(activeBaseLayerName);
    if (!nextLayer || nextLayer === activeBaseLayerName) {
      setStatus("Mapa base indisponível. Verifique conexão ou proxy.");
      return;
    }
    setStatus(`Falha em ${activeBaseLayerName}. Tentando ${nextLayer}...`);
    // Fallback automático não deve sobrescrever preferência manual do usuário.
    setBaseLayer(nextLayer, false);
  }

  function bindBaseLayerEvents(name, layer) {
    if (!layer || !layer.on) return;
    layer.on("tileload", function() {
      if (name !== activeBaseLayerName) return;
      activeLayerTileLoads += 1;
      if (activeLayerTileLoads === 1) {
        console.info("[MAP TILE OK]", name);
        setStatus(`Mapa base carregado: ${name}`);
      }
    });
    layer.on("tileerror", function(evt) {
      if (name !== activeBaseLayerName) return;
      try {
        const src = (evt && evt.tile && evt.tile.src) ? evt.tile.src : "";
        console.error("[MAP TILE ERROR]", name, src);
      } catch (e) {}
      activeLayerTileErrors += 1;
      maybeFallbackFromTileErrors(name);
    });
  }

  Object.entries(baseLayers).forEach(([name, layer]) => bindBaseLayerEvents(name, layer));

  // Objeto para conter as sobreposições (Overlays)
  const overlayLayers = {};

  // Inicializa o controle com o seletor de microbacias habilitado futuramente
  const layerControl = L.control.layers(baseLayers, overlayLayers, { position:"topright" }).addTo(map);

  setBaseLayer("Mapa Claro");
  /* ===========================
     MICROBACIAS / MARKER / HEAT
  ============================ */
  let microLayer = null;
  let marker = null;
  let heatLayer = null;
  let lastMicroSignature = "";

  const PALETA = [
    "#e6194B","#3cb44b","#ffe119","#4363d8","#f58231",
    "#911eb4","#42d4f4","#f032e6","#bfef45","#fabed4",
    "#469990","#dcbeff","#9A6324","#fffac8","#800000"
  ];

  let mapaCores = {};
  let corIndex = 0;

  function getCor(nome){
    if(!nome) return "#3388ff";
    if(!mapaCores[nome]){
      mapaCores[nome] = PALETA[corIndex % PALETA.length];
      corIndex++;
    }
    return mapaCores[nome];
  }

  function bringOverlaysToFront(){
    try { if (microLayer) microLayer.bringToFront(); } catch(e){}
    try { if (heatLayer) heatLayer.bringToFront(); } catch(e){}
    try { if (marker) marker.setZIndexOffset(1000); } catch(e){}
  }

  /* ===========================
     CONTROLE CAMADA ATIVA
  ============================ */
  function setBaseLayer(name, persistPreference = true){
    if (name === "Satélite") {
      name = "Satelite";
    }
    if (!baseLayers[name]) return;
    const alreadyActive = activeBaseLayerName === name && map.hasLayer(baseLayers[name]);
    if (alreadyActive) {
      if (persistPreference && bridge && bridge.onLayerChanged) {
        bridge.onLayerChanged(name);
      }
      bringOverlaysToFront();
      return;
    }
    Object.values(baseLayers).forEach(layer => {
      if(map.hasLayer(layer)) map.removeLayer(layer);
    });
    activeBaseLayerName = name;
    resetBaseLayerCounters();
    suppressLayerChangePersistence = !persistPreference;
    console.info("[MAP BASE] carregando", name);
    setStatus(`Carregando mapa base: ${name}...`);
    baseLayers[name].addTo(map);
    bringOverlaysToFront();
  }

  function setTheme(theme){
    if(theme === "dark"){
      document.body.classList.add("dark");
    } else {
      document.body.classList.remove("dark");
    }
  }

  /* ===========================
     MICROBACIAS
  ============================ */
  function setMicrobacias(geojsonObj){
    try {
      const total = Array.isArray(geojsonObj?.features) ? geojsonObj.features.length : 0;
      console.info("[MICRO] recebidas", total);
      const firstName = total ? (geojsonObj.features[0]?.properties?.Nome_Do_Arquivo || "") : "";
      const lastName = total ? (geojsonObj.features[total - 1]?.properties?.Nome_Do_Arquivo || "") : "";
      const signature = `${total}|${firstName}|${lastName}`;

      // Se já existe, remove do mapa e do controle de camadas antes de recriar
      if(microLayer) {
          if (signature && signature === lastMicroSignature) {
            console.info("[MICRO] sem mudanças, mantendo layer atual");
            bringOverlaysToFront();
            return;
          }
          layerControl.removeLayer(microLayer);
          map.removeLayer(microLayer);
      }

      if(!total){
        setStatus("Sem microbacias para exibir.");
        return;
      }

      mapaCores = {};
      corIndex = 0;

      microLayer = L.geoJSON(geojsonObj, {
        style: (feat) => {
          const nome = feat?.properties?.Nome_Do_Arquivo || "Desconhecido";
          const cor = getCor(nome);
          return {
            color: cor,
            weight: 2.4,
            opacity: 0.95,
            fillColor: cor,
            fillOpacity: 0.24
          };
        },
        onEachFeature: (feature, layer) => {
          const nome = feature?.properties?.Nome_Do_Arquivo;
          if(nome){
            layer.bindTooltip(nome, { sticky:true, direction:"top" });
          }
        }
      }).addTo(map);

      // ADICIONA O TOGGLE: Permite ligar/desligar no menu superior direito
      layerControl.addOverlay(microLayer, "Exibir Microbacias");

      try {
        const b = microLayer.getBounds();
        if (b && b.isValid()) {
          map.fitBounds(b, { padding:[18,18] });
          console.info("[MICRO] bounds aplicados");
        }
      } catch(e) {
        console.error("[MICRO] erro ao aplicar bounds", e);
      }

      lastMicroSignature = signature;
      try { map.invalidateSize(true); } catch(e) {}
      bringOverlaysToFront();
      console.info("[MICRO] layer renderizado");
      setStatus(`Microbacias carregadas: ${total}`);
    } catch (e) {
      console.error("[MICRO] falha ao renderizar", e);
      setStatus("Falha ao renderizar microbacias.");
    }
  }

  // Highlight sem recriar o layer
  function highlightGeoJsonByName(field, value){
    if(!microLayer) return;

    const target = String(value || "").trim().toUpperCase();

    microLayer.eachLayer(layer => {
      try {
        const props = layer?.feature?.properties || {};
        const nome = props?.Nome_Do_Arquivo;
        const cor = getCor(nome);
        const v = props?.[field];

        const hit = v && String(v).trim().toUpperCase() === target;

        layer.setStyle(hit
          ? { color: cor, weight: 4, opacity: 0.95, fillColor: cor, fillOpacity: 0.38 }
          : { color: cor, weight: 1.5, opacity: 0.75, fillColor: cor, fillOpacity: 0.06 }
        );
      } catch(e){}
    });

    bringOverlaysToFront();
  }

  /* ===========================
     MARKER
  ============================ */
  function setMarker(lat, lng){
    if(marker) map.removeLayer(marker);
    marker = L.marker([lat, lng], { riseOnHover:true }).addTo(map);
    marker.setZIndexOffset(1000);
    // Faz uma transiÃ§Ã£o suave para o ponto com um zoom de detalhe (16)
    map.flyTo([lat, lng], 16, {
      duration: 1.5 // segundos
    });
  }

  /* ===========================
     HEATMAP
  ============================ */
  function setHeatmap(points){
    if(heatLayer){
      map.removeLayer(heatLayer);
      heatLayer = null;
    }
    if(!points || points.length === 0) return;
    if(typeof L.heatLayer !== "function"){
      setStatus("Mapa carregado sem plugin de calor.");
      return;
    }

    heatLayer = L.heatLayer(points, {
      radius: 28,
      blur: 20,
      maxZoom: 15
    }).addTo(map);

    bringOverlaysToFront();
  }

  /* ===========================
     QWEBCHANNEL
  ============================ */
  let bridge = null;

  new QWebChannel(qt.webChannelTransport, function(channel){
    bridge = channel.objects.bridge;
  });

  map.on("baselayerchange", function(e){
    if (suppressLayerChangePersistence) {
      suppressLayerChangePersistence = false;
      bringOverlaysToFront();
      return;
    }
    if(bridge && bridge.onLayerChanged){
      bridge.onLayerChanged(e.name);
    }
    bringOverlaysToFront();
  });

  map.on("click", function(e){
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;
    setMarker(lat, lng);
    if(bridge && bridge.onMapClicked){
      bridge.onMapClicked(lat, lng);
    }
  });

  window.addEventListener("resize", function(){
    try { map.invalidateSize(true); } catch(e){}
  });

  /* ===========================
     EXPORTS
  ============================ */
  window.setTheme = setTheme;
  window.setBaseLayer = setBaseLayer;
  window.setHeatmap = setHeatmap;
  window.setStatus = setStatus;
  window.setMarker = setMarker;
  window.setMicrobacias = setMicrobacias;
  window.highlightGeoJsonByName = highlightGeoJsonByName;

</script>
</body>
</html>
